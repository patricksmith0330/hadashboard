      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: custom:bubble-card
                card_type: pop-up
                hash: '#tesla'
                button_type: name
                name: Maze
                icon: phu:tesla-icon
                sub_button: []
                show_header: true
                auto_close: '0'
                margin: 7px
                close_on_click: false
                card_layout: normal
              - type: custom:button-card
                show_state: true
                tap_action:
                  action: none
                custom_fields:
                  tesla_image1: >
                    <img src="/local/maze-y.png" style="
                      width: 100%;
                      height: 100%;
                      object-fit: contain;
                      border-radius: 0;
                      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
                      transition: all 0.3s ease;
                    " onmouseover="this.style.filter='drop-shadow(0 0 30px
                    rgba(255, 255, 255, 0.2))';
                    this.style.transform='scale(1.01)'" 
                    onmouseout="this.style.filter='drop-shadow(0 0 20px
                    rgba(255, 255, 255, 0.1))';
                    this.style.transform='scale(1)'">
                  battery_info:
                    card:
                      type: custom:mushroom-template-card
                      primary: >
                        {% if states('sensor.maze_battery') not in ['unknown',
                        'unavailable'] %}
                          {{ states('sensor.maze_battery') | round }}%
                        {% else %}
                          --
                        {% endif %}
                      secondary: Battery
                      card_mod:
                        style:
                          mushroom-state-info$: |
                            .primary {
                              font-size: clamp(16px, 2.5vw, 20px) !important;
                              font-weight: 700 !important;
                              color: white !important;
                              text-align: center !important;
                              text-shadow: 0 0 10px rgba(255, 255, 255, 0.3) !important;
                            }
                            .secondary {
                              font-size: clamp(12px, 1.8vw, 16px) !important;
                              color: rgba(255, 255, 255, 0.8) !important;
                              text-align: center !important;
                              text-shadow: 0 0 5px rgba(255, 255, 255, 0.2) !important;
                            }
                          .: |
                            ha-card {
                              background: transparent !important;
                              border: none !important;
                              box-shadow: none !important;
                              text-align: center !important;
                            }
                          ha-card: |
                            background: none !important;
                            border: none !important;
                            box-shadow: none !important;
                  range_info:
                    card:
                      type: custom:mushroom-template-card
                      primary: >
                        {% if states('sensor.maze_range') not in ['unknown',
                        'unavailable'] %}
                          {{ states('sensor.maze_range') | round }} mi
                        {% else %}
                          --
                        {% endif %}
                      secondary: Range
                      card_mod:
                        style:
                          mushroom-state-info$: |
                            .primary {
                              font-size: clamp(16px, 2.5vw, 20px) !important;
                              font-weight: 700 !important;
                              color: white !important;
                              text-align: center !important;
                              text-shadow: 0 0 10px rgba(255, 255, 255, 0.3) !important;
                            }
                            .secondary {
                              font-size: clamp(12px, 1.8vw, 16px) !important;
                              color: rgba(255, 255, 255, 0.8) !important;
                              text-align: center !important;
                              text-shadow: 0 0 5px rgba(255, 255, 255, 0.2) !important;
                            }
                          .: |
                            ha-card {
                              background: transparent !important;
                              border: none !important;
                              box-shadow: none !important;
                              text-align: center !important;
                            }
                  odometer_info:
                    card:
                      type: custom:mushroom-template-card
                      primary: >
                        {% if states('sensor.maze_odometer_2') not in
                        ['unknown', 'unavailable'] %}
                          {{ '{:,}'.format(states('sensor.maze_odometer_2') | float | round) }} mi
                        {% else %}
                          --
                        {% endif %}
                      secondary: Odometer
                      card_mod:
                        style:
                          mushroom-state-info$: |
                            .primary {
                              font-size: clamp(16px, 2.5vw, 20px) !important;
                              font-weight: 700 !important;
                              color: white !important;
                              text-align: center !important;
                              text-shadow: 0 0 10px rgba(255, 255, 255, 0.3) !important;
                            }
                            .secondary {
                              font-size: clamp(12px, 1.8vw, 16px) !important;
                              color: rgba(255, 255, 255, 0.8) !important;
                              text-align: center !important;
                              text-shadow: 0 0 5px rgba(255, 255, 255, 0.2) !important;
                            }
                          .: |
                            ha-card {
                              background: transparent !important;
                              border: none !important;
                              box-shadow: none !important;
                              text-align: center !important;
                            }
                styles:
                  card:
                    - width: 100%
                    - max-width: 100%
                    - min-height: 50vh
                    - height: auto
                    - aspect-ratio: 16/9
                    - background: |
                        [[[
                          return `linear-gradient(145deg, rgba(0, 0, 0, 0.95) 0%, rgba(15, 15, 25, 0.98) 50%, rgba(0, 0, 0, 0.95) 100%)`;
                        ]]]
                    - border: 1px solid rgba(255, 255, 255, 0.1)
                    - border-radius: 20px
                    - box-shadow: |
                        [[[
                          return `0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.02)`;
                        ]]]
                    - backdrop-filter: blur(10px)
                    - transition: all 0.3s ease
                    - overflow: hidden
                    - display: grid
                    - grid-template-columns: 1fr
                    - grid-template-rows: 1fr auto
                    - gap: 1rem
                    - padding: 1rem
                  custom_fields:
                    tesla_image1:
                      - position: absolute
                      - top: 0
                      - left: 0
                      - width: 100%
                      - height: calc(100% - 100px)
                      - z-index: 1
                    battery_glow:
                      - position: absolute
                      - top: 55%
                      - right: 15%
                      - width: clamp(80px, 12vw, 120px)
                      - height: clamp(50px, 8vw, 80px)
                      - z-index: 2
                    battery_info:
                      - position: absolute
                      - bottom: 1rem
                      - height: clamp(60px, 10vh, 80px)
                      - z-index: 5
                      - display: flex
                      - align-items: center
                      - justify-content: center
                      - width: calc(33.33% - 1rem)
                      - left: 1rem
                    range_info:
                      - position: absolute
                      - bottom: 1rem
                      - height: clamp(60px, 10vh, 80px)
                      - z-index: 5
                      - display: flex
                      - align-items: center
                      - justify-content: center
                      - width: calc(33.33% - 1rem)
                      - left: calc(33.33% + 0.5rem)
                    odometer_info:
                      - position: absolute
                      - bottom: 1rem
                      - height: clamp(60px, 10vh, 80px)
                      - z-index: 5
                      - display: flex
                      - align-items: center
                      - justify-content: center
                      - width: calc(33.33% - 1rem)
                      - right: 1rem
                card_mod:
                  style: |
                    ha-card {
                      position: relative;
                    }
                    @media (max-width: 768px) {
                      .custom-field[data-field$="_info"] {
                        width: calc(33.33% - 1rem) !important;
                      }
                    }
                    @media (max-width: 480px) {
                      .custom-field[data-field$="_info"] {
                        width: calc(100% - 2rem) !important;
                        left: 1rem !important;
                        right: 1rem !important;
                        text-align: center !important;
                      }
                      .custom-field[data-field="range_info"] {
                        bottom: calc(1rem + 50px) !important;
                      }
                      .custom-field[data-field="odometer_info"] {
                        bottom: calc(1rem + 100px) !important;
                      }
                    }
